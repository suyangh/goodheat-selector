<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOODHEAT 产品选型工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .step-active { border-color: #F97316; background-color: #FFF7ED; }
    .btn-primary { background-color: #F97316; color: white; }
    .btn-primary:hover { background-color: #EA580C; }
    /* Card selection styles */
    .card-selected { border-color: #F97316; background-color: #FFF7ED; }
    .selectable-card { border-color: #E5E7EB; }
    .selectable-card:hover { background-color: #F9FAFB; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">GOODHEAT</h1>
      <p class="text-gray-600" data-t="subtitle">暖通产品智能选型工具</p>
      <div class="mt-4 flex justify-center gap-2">
        <button onclick="setLang('zh')" class="px-3 py-1 text-sm rounded border">中文</button>
        <button onclick="setLang('en')" class="px-3 py-1 text-sm rounded border">English</button>
        <button onclick="setLang('de')" class="px-3 py-1 text-sm rounded border">Deutsch</button>
      </div>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-lg shadow p-6">

      <!-- Step 1: House Info -->
      <div class="mb-8">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 step-1-title" data-t="houseInfo">房屋信息</h2>

        <div class="space-y-4">
          <!-- Building Type -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" data-t="buildingType">建筑类型</label>
            <div class="grid grid-cols-3 gap-3">
              <label class="cursor-pointer">
                <input type="radio" name="buildingType" value="detached" class="sr-only" checked onchange="updateCardStyle(this)">
                <div class="selectable-card card-selected border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">🏠</div>
                  <div class="text-sm" data-t="detached">独栋</div>
                </div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="buildingType" value="terraced" class="sr-only" onchange="updateCardStyle(this)">
                <div class="selectable-card border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">🏘️</div>
                  <div class="text-sm" data-t="terraced">联排</div>
                </div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="buildingType" value="apartment" class="sr-only" onchange="updateCardStyle(this)">
                <div class="selectable-card border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">🏢</div>
                  <div class="text-sm" data-t="apartment">公寓</div>
                </div>
              </label>
            </div>
          </div>

          <!-- Area -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              <span data-t="area">建筑面积</span>: <span id="areaValue" class="text-orange-600 font-bold">100</span> m²
            </label>
            <input type="range" id="area" min="50" max="500" step="10" value="100"
                   class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                   oninput="document.getElementById('areaValue').textContent = this.value">
            <div class="flex justify-between text-xs text-gray-500 mt-1">
              <span>50 m²</span>
              <span>500 m²</span>
            </div>
          </div>

          <!-- Build Year -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" data-t="buildYear">建造年代</label>
            <select id="buildYear" class="w-full border rounded-lg px-3 py-2">
              <option value="pre1940" data-t="pre1940">1940 年前</option>
              <option value="1940-1990" selected data-t="y1940_1990">1945-1990</option>
              <option value="1990-2010" data-t="y1990_2010">1990-2010</option>
              <option value="post2010" data-t="post2010">2010 年后</option>
            </select>
          </div>

          <!-- Heating Type -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" data-t="heatingType">末端形式</label>
            <div class="grid grid-cols-3 gap-3">
              <label class="cursor-pointer">
                <input type="radio" name="heatingType" value="radiator" class="sr-only" checked onchange="updateCardStyle(this)">
                <div class="selectable-card card-selected border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">🔥</div>
                  <div class="text-sm" data-t="radiator">散热器</div>
                </div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="heatingType" value="floor" class="sr-only" onchange="updateCardStyle(this)">
                <div class="selectable-card border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">♨️</div>
                  <div class="text-sm" data-t="floor">地暖</div>
                </div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="heatingType" value="fancoil" class="sr-only" onchange="updateCardStyle(this)">
                <div class="selectable-card border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">💨</div>
                  <div class="text-sm" data-t="fancoil">风机盘管</div>
                </div>
              </label>
            </div>
          </div>

          <!-- Retrofit -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" data-t="retrofit">保温改良</label>
            <div class="space-y-2">
              <label class="flex items-center">
                <input type="checkbox" name="retrofit" value="none" checked class="mr-2">
                <span data-t="noRetrofit">未做任何翻新</span>
              </label>
              <label class="flex items-center">
                <input type="checkbox" name="retrofit" value="window" class="mr-2">
                <span data-t="newWindows">已更换双层/三层玻璃窗</span>
              </label>
              <label class="flex items-center">
                <input type="checkbox" name="retrofit" value="insulation" class="mr-2">
                <span data-t="wallInsulation">外墙已增加保温层</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 2: Hot Water -->
      <div class="mb-8">
        <h2 class="text-lg font-semibold text-gray-800 mb-4" data-t="hotWater">生活热水需求</h2>

        <div class="space-y-4">
          <!-- People Count -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              <span data-t="peopleCount">常住人数</span>: <span id="peopleValue" class="text-orange-600 font-bold">3</span> <span data-t="people">人</span>
            </label>
            <div class="flex items-center gap-4">
              <button onclick="adjustPeople(-1)" class="w-10 h-10 rounded-full border-2 border-gray-300 text-xl font-bold hover:bg-gray-100">−</button>
              <input type="hidden" id="people" value="3">
              <div class="flex-1 text-center text-lg" id="peopleDisplay">3</div>
              <button onclick="adjustPeople(1)" class="w-10 h-10 rounded-full border-2 border-gray-300 text-xl font-bold hover:bg-gray-100">+</button>
            </div>
          </div>

          <!-- Bathtub -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" data-t="bathtub">您家是否有浴缸？</label>
            <div class="flex gap-4">
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="bathtub" value="yes" class="sr-only" onchange="updateCardStyle(this)">
                <div class="selectable-card border-2 rounded-lg p-3 text-center" data-t="yes">是</div>
              </label>
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="bathtub" value="no" class="sr-only" checked onchange="updateCardStyle(this)">
                <div class="selectable-card card-selected border-2 rounded-lg p-3 text-center" data-t="no">否</div>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 3: Comfort Settings -->
      <div class="mb-8">
        <h2 class="text-lg font-semibold text-gray-800 mb-4" data-t="comfort">舒适度与气候校准</h2>

        <div class="space-y-4">
          <!-- Target Temp -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              <span data-t="targetTemp">期望室温</span>: <span id="targetTempValue" class="text-orange-600 font-bold">21</span>℃
            </label>
            <input type="range" id="targetTemp" min="19" max="23" step="1" value="21"
                   class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                   oninput="document.getElementById('targetTempValue').textContent = this.value">
            <div class="flex justify-between text-xs text-gray-500 mt-1">
              <span>19℃</span>
              <span>23℃</span>
            </div>
          </div>

          <!-- Design Temp -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" data-t="designTemp">当地冬季最低温</label>
            <select id="citySelect" class="w-full border rounded-lg px-3 py-2 mb-2" onchange="updateDesignTemp()">
              <option value="" data-t="selectCity">请选择城市...</option>
              <option value="berlin" data-temp="-10">柏林 Berlin (-10℃)</option>
              <option value="munich" data-temp="-12">慕尼黑 Munich (-12℃)</option>
              <option value="hamburg" data-temp="-8">汉堡 Hamburg (-8℃)</option>
              <option value="paris" data-temp="-5">巴黎 Paris (-5℃)</option>
              <option value="london" data-temp="-3">伦敦 London (-3℃)</option>
              <option value="madrid" data-temp="-4">马德里 Madrid (-4℃)</option>
              <option value="rome" data-temp="-2">罗马 Rome (-2℃)</option>
              <option value="beijing" data-temp="-12">北京 Beijing (-12℃)</option>
              <option value="shanghai" data-temp="-5">上海 Shanghai (-5℃)</option>
            </select>
            <div class="flex items-center gap-2">
              <input type="number" id="designTemp" value="-10"
                     class="w-24 border rounded-lg px-3 py-2" min="-30" max="5">
              <span class="text-gray-500">℃</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 4: Cooling Option -->
      <div class="mb-8">
        <h2 class="text-lg font-semibold text-gray-800 mb-4" data-t="coolingOption">夏季制冷需求</h2>

        <div class="space-y-4">
          <!-- Cooling Needed -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" data-t="needCooling">您是否需要夏季制冷功能？</label>
            <div class="flex gap-4">
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="cooling" value="yes" class="sr-only" onchange="updateCardStyle(this)">
                <div class="selectable-card border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">❄️</div>
                  <div class="text-sm" data-t="yesCooling">需要（三联供：供暖 + 制冷 + 热水）</div>
                </div>
              </label>
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="cooling" value="no" class="sr-only" checked onchange="updateCardStyle(this)">
                <div class="selectable-card card-selected border-2 rounded-lg p-3 text-center">
                  <div class="text-2xl mb-1">🔥</div>
                  <div class="text-sm" data-t="noCooling">不需要（只需供暖 + 热水）</div>
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <button onclick="calculate()" class="w-full btn-primary py-4 rounded-lg text-lg font-semibold shadow-lg">
        <span data-t="calculate">开始计算</span>
      </button>

    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
      <div class="bg-white rounded-lg max-w-md w-full p-6 relative">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">&times;</button>

        <div class="text-center mb-6">
          <span class="text-sm text-orange-600 font-medium" data-t="recommended">推荐型号</span>
          <h3 id="resultModel" class="text-2xl font-bold text-gray-800 mt-1">GOODHEAT Aurora Plus 35C</h3>
          <div id="resultType" class="text-gray-600 mt-1">空气源热泵</div>

          <!-- 3-in-1 features -->
          <div id="resultFeatures" class="mt-3 flex justify-center gap-2 text-sm">
            <span class="px-2 py-1 bg-orange-100 text-orange-700 rounded">🔥 供暖</span>
            <span class="hidden px-2 py-1 bg-blue-100 text-blue-700 rounded" id="featureCooling">❄️ 制冷</span>
            <span class="px-2 py-1 bg-green-100 text-green-700 rounded">💧 热水</span>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-orange-50 rounded-lg p-3 text-center">
            <div class="text-2xl mb-1">🔥</div>
            <div id="resultHeating" class="text-orange-600 font-bold">16.2 kW</div>
            <div class="text-xs text-gray-500" data-t="heatingOutput">采暖输出</div>
          </div>
          <div class="bg-blue-50 rounded-lg p-3 text-center">
            <div class="text-2xl mb-1">💧</div>
            <div id="resultWater" class="text-blue-600 font-bold">200 L</div>
            <div class="text-xs text-gray-500" data-t="waterVolume">热水容积</div>
          </div>
          <div class="bg-green-50 rounded-lg p-3 text-center">
            <div class="text-2xl mb-1">📊</div>
            <div id="resultEnergy" class="text-green-600 font-bold">A+</div>
            <div class="text-xs text-gray-500" data-t="energyClass">能效等级</div>
          </div>
        </div>

        <div class="space-y-3">
          <button class="w-full border-2 border-orange-500 text-orange-600 py-3 rounded-lg font-medium hover:bg-orange-50" data-t="downloadPDF">
            📥 下载 PDF 样本
          </button>
          <button class="w-full border-2 border-gray-300 text-gray-700 py-3 rounded-lg font-medium hover:bg-gray-50" data-t="findDealer">
            📍 查找附近经销商
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Translations
    const translations = {
      zh: {

        yesCooling: '需要（三联供：供暖 + 制冷 + 热水）',
        noCooling: '不需要（只需供暖 + 热水）'
      },
      en: {
        subtitle: 'HVAC Product Selector',
        houseInfo: 'House Information',
        buildingType: 'Building Type',
        detached: 'Detached',
        terraced: 'Terraced',

        noRetrofit: 'No renovation',

        wallInsulation: 'Wall insulation added',
        hotWater: 'Domestic Hot Water',

        people: 'people',
        bathtub: 'Do you have a bathtub?',

        no: 'No',
        comfort: 'Comfort & Climate',
        targetTemp: 'Target Room Temp',
        designTemp: 'Winter Design Temp',

        calculate: 'Calculate',

        waterVolume: 'Water Volume',
        energyClass: 'Energy Class',
        downloadPDF: '📥 Download PDF',

        yesCooling: 'Yes (3-in-1: Heating + Cooling + Hot Water)',
        noCooling: 'No (Heating + Hot Water only)'
      },
      de: {
        subtitle: 'Intelligentes HVAC-Produktauswahltool',
        houseInfo: 'Hausinformation',
        buildingType: 'Gebäudetyp',
        detached: 'Einfamilienhaus',
        terraced: 'Reihenhaus',
        apartment: 'Wohnung',
        area: 'Wohnfläche',
        buildYear: 'Baujahr',

        y1940_1990: '1945-1990',
        y1990_2010: '1990-2010',

        heatingType: 'Heizungstyp',
        radiator: 'Heizkörper',

        retrofit: 'Isolierung',

        wallInsulation: 'Wandisolierung',

        noCooling: 'Nein (nur Heizen + Warmwasser)'
      }
    };

    let currentLang = 'zh';

    function setLang(lang) {
      currentLang = lang;
      const t = translations[lang] || translations.zh;
      document.querySelectorAll('[data-t]').forEach(el => {
        const key = el.dataset.t;
        if (t[key]) el.textContent = t[key];
      });
    }

    function adjustPeople(delta) {
      const input = document.getElementById('people');
      let val = parseInt(input.value) + delta;
      if (val < 1) val = 1;
      if (val > 10) val = 10;
      input.value = val;
      document.getElementById('peopleValue').textContent = val;
      document.getElementById('peopleDisplay').textContent = val;
    }

    function updateCardStyle(selectedInput) {
      // Find the parent label and its card div
      const card = selectedInput.parentElement.querySelector('.selectable-card');
      if (!card) return;

      // Get the name of the radio group
      const groupName = selectedInput.name;

      // Remove card-selected from all cards in this group
      document.querySelectorAll(`input[name="${groupName}"]`).forEach(input => {
        const parentCard = input.parentElement.querySelector('.selectable-card');
        if (parentCard) {
          parentCard.classList.remove('card-selected');
        }
      });

      // Add card-selected to selected card
      card.classList.add('card-selected');
    }

    function updateDesignTemp() {
      const select = document.getElementById('citySelect');
      const option = select.options[select.selectedIndex];
      const temp = option.dataset.temp;
      if (temp) {
        document.getElementById('designTemp').value = temp;
      }
    }

    // Products database - from Parameter Table.xlsx
    const products = [
      // R290 Monoblock (heating/cooling, high temp up to 75C)
      { model: 'GSHVSH-6AA1', type: 'R290 Monoblock', capacity: 6, category: 'heating_cooling' },
      { model: 'GSHVSH-8AA1', type: 'R290 Monoblock', capacity: 8, category: 'heating_cooling' },
      { model: 'GSHVSH-10AA1', type: 'R290 Monoblock', capacity: 10, category: 'heating_cooling' },
      { model: 'GSHVTH-10AA1', type: 'R290 Monoblock', capacity: 10, category: 'heating_cooling_3phase' },
      { model: 'GSHVSH-12AA1', type: 'R290 Monoblock', capacity: 12, category: 'heating_cooling' },
      { model: 'GSHVTH-12AA1', type: 'R290 Monoblock', capacity: 12, category: 'heating_cooling_3phase' },
      { model: 'GSHVSH-16AA1', type: 'R290 Monoblock', capacity: 16, category: 'heating_cooling' },
      { model: 'GSHVTH-16AA1', type: 'R290 Monoblock', capacity: 16, category: 'heating_cooling_3phase' },
      { model: 'GSHVSH-18AA1', type: 'R290 Monoblock', capacity: 18, category: 'heating_cooling' },
      { model: 'GSHVTH-18AA1', type: 'R290 Monoblock', capacity: 18, category: 'heating_cooling_3phase' },
      { model: 'GSHVTH-24AA1', type: 'R290 Monoblock', capacity: 24, category: 'heating_cooling_3phase' },
      // R32 Mono Inverter
      { model: 'GSHVSH-6BA1', type: 'R32 Mono Inverter', capacity: 6, category: 'heating_cooling' },
      { model: 'GSHVSH-8BA1', type: 'R32 Mono Inverter', capacity: 8, category: 'heating_cooling' },
      { model: 'GSHVSH-10BA1', type: 'R32 Mono Inverter', capacity: 10, category: 'heating_cooling' },
      { model: 'GSHVTH-10BA1', type: 'R32 Mono Inverter', capacity: 10, category: 'heating_cooling_3phase' },
      { model: 'GSHVSH-12BA1', type: 'R32 Mono Inverter', capacity: 12, category: 'heating_cooling' },
      { model: 'GSHVTH-12BA1', type: 'R32 Mono Inverter', capacity: 12, category: 'heating_cooling_3phase' },
      { model: 'GSHVSH-14BA1', type: 'R32 Mono Inverter', capacity: 14, category: 'heating_cooling' },
      { model: 'GSHVTH-14BA1', type: 'R32 Mono Inverter', capacity: 14, category: 'heating_cooling_3phase' },
      { model: 'GSHVSH-16BA1', type: 'R32 Mono Inverter', capacity: 16, category: 'heating_cooling' },
      { model: 'GSHVTH-16BA1', type: 'R32 Mono Inverter', capacity: 16, category: 'heating_cooling_3phase' },
      { model: 'GSHVSH-18BA1', type: 'R32 Mono Inverter', capacity: 18, category: 'heating_cooling' },
      { model: 'GSHVTH-18BA1', type: 'R32 Mono Inverter', capacity: 18, category: 'heating_cooling_3phase' },
      { model: 'GSHVTH-24BA1', type: 'R32 Mono Inverter', capacity: 24, category: 'heating_cooling_3phase' },
      { model: 'GSHVTH-34BA1', type: 'R32 Mono Inverter', capacity: 34, category: 'heating_cooling_3phase' },
      // Swimming Pool
      { model: 'GSPVSH-7BA1', type: 'Swimming Pool', capacity: 7, category: 'pool' },
      { model: 'GSPVSH-9BA1', type: 'Swimming Pool', capacity: 9, category: 'pool' },
      { model: 'GSPVSH-12BA1', type: 'Swimming Pool', capacity: 12, category: 'pool' },
      { model: 'GSPVSH-15BA1', type: 'Swimming Pool', capacity: 15, category: 'pool' },
      { model: 'GSPVSH-18BA1', type: 'Swimming Pool', capacity: 18, category: 'pool' },
      { model: 'GSPVSH-25BA1', type: 'Swimming Pool', capacity: 25, category: 'pool' },
      { model: 'GSPVSH-35BA1', type: 'Swimming Pool', capacity: 35, category: 'pool' },
      { model: 'GSPVTH-25BA1', type: 'Swimming Pool', capacity: 25, category: 'pool_3phase' },
      { model: 'GSPVTH-35BA1', type: 'Swimming Pool', capacity: 35, category: 'pool_3phase' },
      // R290 Hot Water (with tank)
      { model: 'GHWVSH-210AA1', type: 'R290 Hot Water', capacity: 3, tank: 210, category: 'hot_water' },
      { model: 'GHWVSH-270AA1', type: 'R290 Hot Water', capacity: 3, tank: 270, category: 'hot_water' },
      { model: 'GHWVSH-320AA1', type: 'R290 Hot Water', capacity: 3, tank: 320, category: 'hot_water' }
    ];

    function calculate() {
      // Get input values
      const area = parseFloat(document.getElementById('area').value);
      const buildingType = document.querySelector('input[name="buildingType"]:checked').value;
      const buildYear = document.getElementById('buildYear').value;
      const heatingType = document.querySelector('input[name="heatingType"]:checked').value;
      const people = parseInt(document.getElementById('people').value);
      const hasBathtub = document.querySelector('input[name="bathtub"]:checked').value === 'yes';
      const targetTemp = parseFloat(document.getElementById('targetTemp').value);
      const designTemp = parseFloat(document.getElementById('designTemp').value);
      const needCooling = document.querySelector('input[name="cooling"]:checked')?.value === 'yes';

      // Get retrofit factor
      const retrofitCheckboxes = document.querySelectorAll('input[name="retrofit"]:checked');
      let fRetrofit = 1.0;
      if (retrofitCheckboxes.length === 1 && retrofitCheckboxes[0].value === 'none') {
        fRetrofit = 1.2;
      } else {
        fRetrofit = 1.0;
        retrofitCheckboxes.forEach(cb => {
          if (cb.value === 'window') fRetrofit *= 0.9;
          if (cb.value === 'insulation') fRetrofit *= 0.8;
        });
      }

      // Base heat load by heating type (W/m²)
      const qBaseMap = { radiator: 100, floor: 80, fancoil: 90 };
      const qBase = qBaseMap[heatingType];

      // Building type factor
      const fTypeMap = { detached: 1.1, terraced: 1.0, apartment: 0.85 };
      const fType = fTypeMap[buildingType];

      // Build year factor
      const fAgeMap = { pre1940: 1.4, '1940-1990': 1.0, '1990-2010': 0.8, post2010: 0.6 };
      const fAge = fAgeMap[buildYear];

      // Temperature factor
      const fTemp = (targetTemp - designTemp) / 31;

      // Calculate total heat load
      const qTotal = (area * qBase) * fType * fAge * fRetrofit * fTemp;
      const qTotalKW = qTotal / 1000;

      // Calculate hot water volume
      const waterVolume = hasBathtub ? 300 : people * 50;

      // Determine required tank capacity (if needs hot water storage)
      const needsTank = waterVolume >= 150;
      const requiredTank = needsTank ? waterVolume : 0;

      // Find matching product
      let selectedProduct = null;
      let isThreeInOne = false;

      if (needCooling) {
        // 需要制冷 - 只推荐 R290/R32 Monoblock（三联供）
        const candidates = products.filter(p =>
          (p.type === 'R290 Monoblock' || p.type === 'R32 Mono Inverter') &&
          p.capacity >= qTotalKW
        );
        if (candidates.length > 0) {
          candidates.sort((a, b) => a.capacity - b.capacity);
          selectedProduct = candidates[0];
          isThreeInOne = true;
        }
      } else if (heatingType === 'radiator') {
        // 不需要制冷，但需要高温出水 - R290/R32 Monoblock
        const candidates = products.filter(p =>
          (p.type === 'R290 Monoblock' || p.type === 'R32 Mono Inverter') &&
          p.capacity >= qTotalKW
        );
        if (candidates.length > 0) {
          candidates.sort((a, b) => a.capacity - b.capacity);
          selectedProduct = candidates[0];
        }
      } else if (heatingType === 'floor' || heatingType === 'fancoil') {
        // 地暖/风盘 - 低温工况，任何热泵都可以
        const candidates = products.filter(p =>
          (p.category === 'heating_cooling' || p.category === 'heating_cooling_3phase') &&
          p.capacity >= qTotalKW
        );
        if (candidates.length > 0) {
          candidates.sort((a, b) => a.capacity - b.capacity);
          selectedProduct = candidates[0];
        }
      }

      // If hot water is the main requirement (large tank needed)
      if (needsTank && requiredTank >= 200) {
        const tankProducts = products.filter(p => p.category === 'hot_water' && p.tank >= requiredTank);
        if (tankProducts.length > 0) {
          tankProducts.sort((a, b) => b.tank - a.tank);
          selectedProduct = tankProducts[0];
        }
      }

      // Fallback to largest R290 monoblock if no match
      if (!selectedProduct) {
        selectedProduct = products.find(p => p.model === 'GSHVTH-24AA1') || products[products.length - 1];
      }

      // Check if selected product is 3-in-1
      isThreeInOne = (selectedProduct.type === 'R290 Monoblock' || selectedProduct.type === 'R32 Mono Inverter');

      // Format product type for display
      const typeDisplay = {
        'R290 Monoblock': 'R290 变频热泵（高温型）',
        'R32 Mono Inverter': 'R32 变频热泵',
        'Swimming Pool': '泳池热泵',
        'R290 Hot Water': 'R290 热水热泵'
      }[selectedProduct.type] || selectedProduct.type;

      // Show result
      document.getElementById('resultModel').textContent = selectedProduct.model;
      document.getElementById('resultType').textContent = typeDisplay;

      // Show 3-in-1 features
      const featureCooling = document.getElementById('featureCooling');
      if (isThreeInOne) {
        featureCooling.classList.remove('hidden');
      } else {
        featureCooling.classList.add('hidden');
      }

      document.getElementById('resultHeating').textContent = qTotalKW.toFixed(1) + ' kW';
      document.getElementById('resultWater').textContent = (selectedProduct.tank || waterVolume) + ' L';
      document.getElementById('resultEnergy').textContent = 'A+++';
      document.getElementById('resultModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('resultModal').classList.add('hidden');
    }

    // Close modal on outside click
    document.getElementById('resultModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
